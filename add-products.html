<!DOCTYPE html>
<html>
<head>
<title>Add Products</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  opacity: 0;
  transition: opacity 0.25s ease;
}

body.loaded {
  opacity: 1;
}

.header {
  background: green;
  color: white;
  padding: 20px;
  text-align: center;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.section {
  background: white;
  padding: 18px;
  margin-bottom: 15px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: 0.2s ease;
}

.section:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.arrow {
  color: green;
}
</style>

</head>

<body>

<div class="header">ADD PRODUCTS</div>

<div class="container">

  <div class="section" onclick="openPage('add-boots.html')">
    ADD BOOTS <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openPage('add-other-shoes.html')">
    ADD OTHER SHOES <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openPage('add-jerseys.html')">
    ADD JERSEYS <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openPage('add-gear.html')">
    ADD GEAR <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openPage('add-equipment.html')">
    ADD OTHER EQUIPMENT <span class="arrow">→</span>
  </div>

</div>

<script>

if (localStorage.getItem("adminLoggedIn") !== "true") {
  window.location.href = "admin-login.html";
}


window.onload = () => {
  document.body.classList.add("loaded");
};

function openPage(page) {
  window.location.href = page;
}

</script>

</body>
</html>
