<!DOCTYPE html>
<html>
<head>
<title>Edit Products</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  min-height: 100vh;
}

.header {
  background: green;
  color: white;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.header .back {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.header h2 { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }

.search-bar {
  padding: 14px 16px;
  background: white;
  border-bottom: 1px solid #eee;
}

.search-bar input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #ddd;
  border-radius: 10px;
  font-size: 14px;
  outline: none;
}

.search-bar input:focus { border-color: green; }

.count {
  padding: 10px 16px;
  font-size: 13px;
  color: #888;
}

.product-list { padding: 0 16px 100px; }

.product-card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.product-card img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  background: #eee;
  flex-shrink: 0;
}

.product-info { flex: 1; min-width: 0; }

.product-info .pname {
  font-size: 14px;
  font-weight: 700;
  color: #111;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.product-info .pmeta {
  font-size: 12px;
  color: #888;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.product-info .pprice {
  font-size: 13px;
  font-weight: 700;
  color: green;
  margin-top: 4px;
}

.pstock {
  font-size: 11px;
  font-weight: 600;
  color: #555;
  margin-top: 2px;
}

.pstock.out { color: #e53935; }

.actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

.btn-edit {
  background: #1a73e8;
  color: white;
  border: none;
  border-radius: 7px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}

.btn-delete {
  background: #e53935;
  color: white;
  border: none;
  border-radius: 7px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}

.empty {
  text-align: center;
  padding: 60px 20px;
  color: #aaa;
  font-size: 15px;
}

/* MODAL */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  justify-content: center;
  align-items: flex-end;
}

.overlay.show { display: flex; }

.modal {
  background: white;
  width: 100%;
  max-width: 480px;
  border-radius: 20px 20px 0 0;
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px 20px 40px;
}

.modal h3 {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 18px;
}

.field-label {
  font-size: 12px;
  color: #888;
  margin-top: 14px;
  margin-bottom: 4px;
}

.modal input, .modal select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #ddd;
  border-radius: 10px;
  font-size: 14px;
  font-family: Arial, sans-serif;
  outline: none;
}

.modal input:focus, .modal select:focus { border-color: green; }

.img-preview-wrap {
  width: 100%;
  aspect-ratio: 1;
  border: 2px dashed #ddd;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-top: 6px;
  position: relative;
}

.img-preview-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 10px;
}

.img-placeholder {
  color: #bbb;
  font-size: 36px;
  text-align: center;
}

.img-placeholder small { display: block; font-size: 12px; margin-top: 4px; }

.soleplates {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}

.sp-chip {
  border: 1.5px solid #ccc;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  color: #666;
  user-select: none;
}

.sp-chip.active {
  border-color: green;
  color: green;
  background: rgba(0,128,0,0.06);
}

.row2 { display: flex; gap: 12px; }
.row2 > div { flex: 1; }

.modal-btns {
  display: flex;
  gap: 10px;
  margin-top: 22px;
}

.modal-btns button {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

.btn-cancel { background: #f0f0f0; color: #333; }
.btn-save   { background: green; color: white; }
.btn-save:disabled { opacity: 0.55; cursor: not-allowed; }

/* DELETE CONFIRM */
.del-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.del-overlay.show { display: flex; }

.del-box {
  background: white;
  border-radius: 16px;
  padding: 28px 24px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.del-box h3 { font-size: 17px; margin-bottom: 10px; }
.del-box p  { font-size: 14px; color: #666; margin-bottom: 22px; }

.del-btns { display: flex; gap: 10px; }

.del-btns button {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

.del-btns .keep   { background: #f0f0f0; color: #333; }
.del-btns .confirm { background: #e53935; color: white; }
.del-btns .confirm:disabled { opacity: 0.55; cursor: not-allowed; }
</style>
</head>

<body>

<div class="header">
  <button class="back" onclick="history.back()"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="13 8 9 12 13 16"/><line x1="9" y1="12" x2="15" y2="12"/></svg></button>
  <h2>MANAGE PRODUCTS</h2>
</div>

<div class="search-bar">
  <input id="searchInput" type="search" placeholder="Search by name or brand…" oninput="renderList()">
</div>

<div class="count" id="countLabel"></div>

<div class="product-list" id="productList"></div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay" onclick="closeEdit(event)">
  <div class="modal" id="editModal">
    <h3>Edit Product</h3>

    <div class="field-label">Photo (tap to change)</div>
    <div class="img-preview-wrap" onclick="document.getElementById('newImage').click()">
      <img id="editImgPreview" style="display:none">
      <div class="img-placeholder" id="editImgPlaceholder">
        <span>+</span>
        <small>Change photo</small>
      </div>
    </div>
    <input type="file" id="newImage" accept="image/*" hidden onchange="previewNewImage()">

    <div class="row2">
      <div>
        <div class="field-label">Brand</div>
        <input id="editBrand" placeholder="Brand">
      </div>
      <div>
        <div class="field-label">Model</div>
        <input id="editModel" placeholder="Model">
      </div>
    </div>

    <div class="field-label">Name</div>
    <input id="editName" placeholder="Product name">

    <div class="row2">
      <div>
        <div class="field-label">Price (₦)</div>
        <input id="editPrice" placeholder="e.g. 45000" type="number" min="0">
      </div>
      <div>
        <div class="field-label">Stock (units)</div>
        <input id="editStock" placeholder="e.g. 10" type="number" min="0">
      </div>
    </div>

    <div class="field-label">Category</div>
    <select id="editCategoryId" onchange="onEditCatChange()"></select>

    <div class="field-label">Subcategory</div>
    <select id="editSubcategoryId" onchange="onEditSubcatChange()"></select>

    <div class="field-label">Section</div>
    <select id="editSectionId"></select>

    <div class="field-label">Colorways (comma-separated)</div>
    <input id="editColorways" placeholder="e.g. Black/White, Red/Gold">

    <div class="field-label">Soleplates</div>
    <div class="soleplates" id="editSoleplates">
      <div class="sp-chip" data-val="fg">FG</div>
      <div class="sp-chip" data-val="ag">AG</div>
      <div class="sp-chip" data-val="sg">SG</div>
      <div class="sp-chip" data-val="tf">TF</div>
      <div class="sp-chip" data-val="ic">IC</div>
      <div class="sp-chip" data-val="mg">MG</div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveProduct()">Save Changes</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="del-overlay" id="delOverlay">
  <div class="del-box">
    <h3>Delete Product?</h3>
    <p id="delMsg">This cannot be undone.</p>
    <div class="del-btns">
      <button class="keep" onclick="closeDelete()">Keep It</button>
      <button class="confirm" id="confirmDelBtn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
if (localStorage.getItem("adminLoggedIn") !== "true") {
  window.location.href = "admin-login.html";
}

let allProducts = [];
let catData = [];
let editingId = null;
let deletingId = null;

async function loadAll() {
  const [pRes, cRes] = await Promise.all([fetch("/products"), fetch("/categories")]);
  allProducts = await pRes.json();
  catData = await cRes.json();
  populateEditCategorySelect();
  renderList();
}

function renderList() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const filtered = allProducts.filter(p =>
    (p.name || "").toLowerCase().includes(q) ||
    (p.brand || "").toLowerCase().includes(q)
  );
  document.getElementById("countLabel").textContent =
    filtered.length + " product" + (filtered.length !== 1 ? "s" : "");

  const el = document.getElementById("productList");
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty">No products found</div>';
    return;
  }

  el.innerHTML = filtered.map(p => `
    <div class="product-card">
      <img src="${p.image ? '/uploads/' + p.image : ''}"
           onerror="this.style.background='#eee';this.removeAttribute('src')"
           alt="">
      <div class="product-info">
        <div class="pname">${p.name || '—'}</div>
        <div class="pmeta">${[p.brand, p.model].filter(Boolean).join(' · ')}</div>
        <div class="pprice">₦${Number(p.price || 0).toLocaleString()}</div>
        <div class="pstock ${p.stock === 0 ? 'out' : ''}">
          ${p.stock === null || p.stock === undefined ? 'Stock: —' : p.stock === 0 ? 'Out of Stock' : 'In Stock: ' + p.stock}
        </div>
      </div>
      <div class="actions">
        <button class="btn-edit" onclick="openEdit(${p.id})">Edit</button>
        <button class="btn-delete" onclick="openDelete(${p.id})">Delete</button>
      </div>
    </div>
  `).join("");
}

/* ── EDIT MODAL ── */
function populateEditCategorySelect() {
  const sel = document.getElementById("editCategoryId");
  sel.innerHTML = catData.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
}

function onEditCatChange() {
  const catId = document.getElementById("editCategoryId").value;
  const cat = catData.find(c => c.id === catId);
  const subs = cat ? (cat.subcategories || []) : [];
  const sel = document.getElementById("editSubcategoryId");
  sel.innerHTML = subs.length
    ? subs.map(s => `<option value="${s.id}">${s.name}</option>`).join("")
    : '<option value="">— none —</option>';
  onEditSubcatChange();
}

function onEditSubcatChange() {
  const catId = document.getElementById("editCategoryId").value;
  const subId = document.getElementById("editSubcategoryId").value;
  const cat = catData.find(c => c.id === catId);
  const sub = cat && (cat.subcategories || []).find(s => s.id === subId);
  const sections = sub ? (sub.sections || []) : [];
  const sel = document.getElementById("editSectionId");
  sel.innerHTML = sections.length
    ? sections.map(s => `<option value="${s.id}">${s.name}</option>`).join("")
    : '<option value="">— none —</option>';
}

function setSelectVal(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  const opt = [...el.options].find(o => o.value === val);
  if (opt) el.value = val;
}

function openEdit(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  editingId = id;

  // image
  const preview = document.getElementById("editImgPreview");
  const placeholder = document.getElementById("editImgPlaceholder");
  document.getElementById("newImage").value = "";
  if (p.image) {
    preview.src = "/uploads/" + p.image;
    preview.style.display = "block";
    placeholder.style.display = "none";
  } else {
    preview.style.display = "none";
    placeholder.style.display = "block";
  }

  document.getElementById("editBrand").value = p.brand || "";
  document.getElementById("editModel").value = p.model || "";
  document.getElementById("editName").value  = p.name  || "";
  document.getElementById("editPrice").value = p.price || "";
  document.getElementById("editStock").value = p.stock !== null && p.stock !== undefined ? p.stock : "";
  document.getElementById("editColorways").value = (p.colorways || []).join(", ");

  // categories
  populateEditCategorySelect();
  setSelectVal("editCategoryId", p.categoryId);
  onEditCatChange();
  setSelectVal("editSubcategoryId", p.subcategoryId);
  onEditSubcatChange();
  setSelectVal("editSectionId", p.sectionId);

  // soleplates
  const active = (p.soleplates || []).map(s => s.toLowerCase());
  document.querySelectorAll("#editSoleplates .sp-chip").forEach(chip => {
    chip.classList.toggle("active", active.includes(chip.dataset.val));
  });
  document.querySelectorAll("#editSoleplates .sp-chip").forEach(chip => {
    chip.onclick = () => chip.classList.toggle("active");
  });

  document.getElementById("editOverlay").classList.add("show");
}

function closeEdit(e) {
  if (e && e.target !== document.getElementById("editOverlay")) return;
  closeEditModal();
}

function closeEditModal() {
  document.getElementById("editOverlay").classList.remove("show");
  editingId = null;
}

function previewNewImage() {
  const file = document.getElementById("newImage").files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("editImgPreview");
    img.src = e.target.result;
    img.style.display = "block";
    document.getElementById("editImgPlaceholder").style.display = "none";
  };
  reader.readAsDataURL(file);
}

async function saveProduct() {
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "Saving…";

  const formData = new FormData();
  formData.append("brand", document.getElementById("editBrand").value.trim());
  formData.append("model", document.getElementById("editModel").value.trim());
  formData.append("name",  document.getElementById("editName").value.trim());
  formData.append("price", document.getElementById("editPrice").value.trim());
  formData.append("stock", document.getElementById("editStock").value !== "" ? document.getElementById("editStock").value : "");
  formData.append("categoryId",    document.getElementById("editCategoryId").value);
  formData.append("subcategoryId", document.getElementById("editSubcategoryId").value);
  formData.append("sectionId",     document.getElementById("editSectionId").value);

  const colors = document.getElementById("editColorways").value
    .split(",").map(s => s.trim()).filter(Boolean);
  formData.append("colorways", JSON.stringify(colors));

  const soles = [...document.querySelectorAll("#editSoleplates .sp-chip.active")]
    .map(c => c.dataset.val);
  formData.append("soleplates", JSON.stringify(soles));

  const newImg = document.getElementById("newImage").files[0];
  if (newImg) formData.append("image", newImg);

  try {
    const res = await fetch("/products/" + editingId, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + localStorage.getItem("adminToken") },
      body: formData
    });
    const data = await res.json();
    if (res.ok) {
      const idx = allProducts.findIndex(p => p.id === editingId);
      if (idx !== -1) allProducts[idx] = data.product;
      closeEditModal();
      renderList();
    } else {
      alert(data.message || "Save failed");
    }
  } catch(e) {
    alert("Network error. Please try again.");
  }

  btn.disabled = false;
  btn.textContent = "Save Changes";
}

/* ── DELETE ── */
function openDelete(id) {
  const p = allProducts.find(x => x.id === id);
  deletingId = id;
  document.getElementById("delMsg").textContent =
    "Delete "" + (p ? p.name : "this product") + ""? This cannot be undone.";
  document.getElementById("delOverlay").classList.add("show");
}

function closeDelete() {
  document.getElementById("delOverlay").classList.remove("show");
  deletingId = null;
}

async function confirmDelete() {
  const btn = document.getElementById("confirmDelBtn");
  btn.disabled = true;
  btn.textContent = "Deleting…";

  try {
    const res = await fetch("/products/" + deletingId, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + localStorage.getItem("adminToken") }
    });
    if (res.ok) {
      allProducts = allProducts.filter(p => p.id !== deletingId);
      closeDelete();
      renderList();
    } else {
      const d = await res.json();
      alert(d.message || "Delete failed");
    }
  } catch(e) {
    alert("Network error. Please try again.");
  }

  btn.disabled = false;
  btn.textContent = "Delete";
}

loadAll();
</script>

</body>
</html>
