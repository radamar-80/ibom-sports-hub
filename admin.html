<!DOCTYPE html>
<html>
<head>
<title>Admin - Add Product</title>

<style>
body { font-family: Arial; padding:20px; }

.label {
  color: grey;
  font-size: 14px;
  margin-top: 15px;
}

.box {
  width: 100%;
  aspect-ratio: 1 / 1;   /* 👈 THIS makes it a perfect square */
  border: 1px solid #ccc;
  margin-top: 5px;

  display: flex;
  align-items: center;
  justify-content: center;

  color: #aaa;
  font-size: 30px;       /* makes the + bigger */
  cursor: pointer;
}

.box:hover {
  border-color: green;
  color: green;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

.row {
  display: flex;
  gap: 10px;
}

.soleplate {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.sp-option {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: grey;
  font-size: 14px;
}

.tick {
  width: 16px;
  height: 16px;
  border: 2px solid #ccc;
  display: inline-block;
  border-radius: 3px;
  transition: all 0.25s ease; /* 👈 smooth animation */
}

.sp-option {
  transition: color 0.2s ease;
}

.sp-option.active {
  color: green;
}

.sp-option.active .tick {
  border-color: green;
  background: green;
  position: relative;
}

.sp-option.active .tick::after {
  content: "✓";
  color: white;
  font-size: 12px;
  position: absolute;
  top: -2px;
  left: 2px;
  opacity: 0;
  transform: scale(0.5);
  animation: popTick 0.2s ease forwards;
}

.sp-option {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: grey;
  font-size: 14px;
  transition: transform 0.1s ease;
}

.sp-option:active {
  transform: scale(0.95);
}

@keyframes popTick {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.color-container input {
  margin-bottom: 5px;
}

.upload-btn {
  background: green;
  color: white;
  padding: 15px;
  border: none;
  width: 100%;
  margin-top: 20px;
  border-radius: 10px;
}
.sizes {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.size-box {
  border:1px solid #ccc;
  padding:8px;
  cursor:pointer;
  color:grey;
}

.size-box.active {
  border-color:green;
  color:green;
}
</style>

</head>

<body>

<h2>Add Boot</h2>

<!-- 1 IMAGE -->
<div class="label">(product photo)</div>
<div class="box" onclick="document.getElementById('image').click()">
  +
</div>
<input type="file" id="image" hidden>

<!-- 2 BRAND + MODEL -->
<div class="row">
  <div style="flex:1">
    <div class="label">(product brand)</div>
    <input id="brand">
  </div>

  <div style="flex:1">
    <div class="label">(product model)</div>
    <input id="model">
  </div>
</div>

<!-- 3 NAME -->
<div class="label">(product name)</div>
<input id="name">

<!-- 4 COLORWAYS -->
<div class="label">(product colorway)</div>
<div id="colors" class="color-container">
  <input placeholder="Enter colorway">
</div>

<!-- 5 SOLEPLATES -->
<div class="label">(product soleplates)</div>
<div class="soleplate">
  <div class="sp-option"><span class="tick"></span> FG</div>
  <div class="sp-option"><span class="tick"></span> AG</div>
  <div class="sp-option"><span class="tick"></span> SG</div>
  <div class="sp-option"><span class="tick"></span> TF</div>
  <div class="sp-option"><span class="tick"></span> IC</div>
  <div class="sp-option"><span class="tick"></span> MG</div>
</div>

<!-- 6 PRICE -->
<div class="label">(product price)</div>
<input id="price">

<button class="upload-btn" onclick="uploadProduct()">UPLOAD PRODUCT</button>

<!-- 7 SIZES -->
<div class="label">(product sizes)</div>

<div class="sizes">
  <div class="size-box">UK</div>
  <div class="size-box">US</div>
  <div class="size-box">EU</div>
  <div class="size-box">JPN</div>
  <div class="size-box">CHN</div>
</div>

<script>
// dynamic color fields
const colorBox = document.getElementById("colors");

colorBox.addEventListener("input", () => {
  const inputs = colorBox.querySelectorAll("input");
  const last = inputs[inputs.length - 1];

  if (last.value !== "") {
    const newInput = document.createElement("input");
    newInput.placeholder = "Enter colorway";
    colorBox.appendChild(newInput);
  }
});

// sizes toggle
document.querySelectorAll(".sp-option").forEach(box => {
  box.onclick = () => {
    const isActive = box.classList.contains("active");

    // remove all active
    document.querySelectorAll(".sp-option").forEach(b => b.classList.remove("active"));

    // if it was NOT active, activate it
    if (!isActive) {
      box.classList.add("active");
    }
  };
});
// upload
async function uploadProduct() {
  const formData = new FormData();

  const image = document.getElementById("image").files[0];
  formData.append("image", image);

  formData.append("brand", brand.value);
  formData.append("model", model.value);
  formData.append("name", name.value);
  formData.append("price", price.value);

const sizes = [...document.querySelectorAll(".size-box.active")]
  .map(s => s.innerText);

formData.append("sizes", JSON.stringify(sizes));

  const colors = [...document.querySelectorAll("#colors input")]
    .map(i => i.value)
    .filter(v => v !== "");

 const selected = document.querySelector(".sp-option.active");
const soleplates = selected ? selected.innerText.replace("✓", "").trim() : "";

  formData.append("colorways", JSON.stringify(colors));
  formData.append("soleplates", JSON.stringify(soleplates));

  await fetch("https://your-replit-link.repl.co/products", {
    method: "POST",
    body: formData
  });

  alert("Uploaded!");
}
</script>

</body>
    </html>
