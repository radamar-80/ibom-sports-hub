<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  opacity: 0;
  transition: opacity 0.25s ease;
}

body.loaded {
  opacity: 1;
}

/* HEADER */
.header {
  background: green;
  color: white;
  padding: 20px;
  text-align: center;
  font-weight: bold;
  line-height: 1.4;
}

/* SECTION BOXES */
.container {
  padding: 20px;
}

.section {
  background: white;
  padding: 18px;
  margin-bottom: 15px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: 0.2s ease;
}

.section:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.arrow {
  font-size: 18px;
  color: green;
}

.logout-btn {
  margin: 10px 20px;
  padding: 10px 15px;
  background: white;
  color: green;
  border: 1px solid green;
  border-radius: 8px;
  cursor: pointer;
  float: right;
}

.logout-btn:hover {
  background: green;
  color: white;
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: white;
  border-radius: 14px;
  padding: 28px 24px;
  width: 90%;
  max-width: 380px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

.modal h2 {
  margin: 0 0 20px;
  font-size: 18px;
  color: #111;
}

.modal input {
  width: 100%;
  box-sizing: border-box;
  padding: 11px 14px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
  font-family: Arial;
}

.modal input:focus {
  border-color: green;
}

.modal-msg {
  font-size: 13px;
  margin-bottom: 12px;
  min-height: 18px;
  font-weight: 600;
}

.modal-msg.success { color: green; }
.modal-msg.error   { color: #c0392b; }

.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}

.btn-save {
  flex: 1;
  padding: 11px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}

.btn-save:hover { opacity: 0.88; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-cancel {
  flex: 1;
  padding: 11px;
  background: #f0f0f0;
  color: #444;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

.btn-cancel:hover { background: #e0e0e0; }

/* ADMIN LIST ROWS */
.admin-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-radius: 8px;
  background: #f8f8f8;
  margin-bottom: 8px;
  font-size: 14px;
}

.admin-row-name { font-weight: 600; color: #222; }

.btn-delete-row {
  padding: 6px 14px;
  background: #c0392b;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.btn-delete-row:hover { opacity: 0.85; }
.btn-delete-row:disabled { opacity: 0.45; cursor: not-allowed; }
</style>

</head>

<body>

<div class="header">
  IBOM SPORTS HUB<br>
  ADMIN DASHBOARD
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="container">

  <div class="section" onclick="openPage('add-products.html')">
    ADD PRODUCTS <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openPage('edit-products.html')">
    EDIT PRODUCTS <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openPage('view-sales.html')">
    VIEW SALES <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openPage('analytics.html')">
    SALES ANALYTICS DASHBOARD <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openPage('admin-support.html')">
    CUSTOMER SUPPORT — LIVE TICKETS <span class="arrow">→</span>
  </div>

  <div class="section" onclick="openChangePassword()">
    CHANGE PASSWORD <span class="arrow">🔑</span>
  </div>

  <div class="section" onclick="openCreateAdmin()">
    CREATE NEW ADMIN <span class="arrow">👤</span>
  </div>

  <div class="section" onclick="openDeleteAdmin()">
    DELETE ADMIN <span class="arrow">🗑️</span>
  </div>

</div>

<!-- DELETE ADMIN MODAL -->
<div class="modal-overlay" id="deleteAdminModal">
  <div class="modal">
    <h2>Delete Admin</h2>
    <p style="margin:0 0 16px;font-size:13px;color:#666;">Your own account is not shown. Deletion is permanent.</p>
    <div id="adminListWrap" style="margin-bottom:12px;"></div>
    <div class="modal-msg" id="deleteAdminMsg"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeDeleteAdmin()">Close</button>
    </div>
  </div>
</div>

<!-- CREATE ADMIN MODAL -->
<div class="modal-overlay" id="createAdminModal">
  <div class="modal">
    <h2>Create New Admin</h2>
    <input type="text" id="newAdminUsername" placeholder="Username" autocomplete="off">
    <input type="password" id="newAdminPassword" placeholder="Password" autocomplete="new-password">
    <input type="password" id="newAdminConfirm" placeholder="Confirm password" autocomplete="new-password">
    <div class="modal-msg" id="createAdminMsg"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeCreateAdmin()">Cancel</button>
      <button class="btn-save" id="createAdminBtn" onclick="submitCreateAdmin()">Create</button>
    </div>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="modal-overlay" id="pwModal">
  <div class="modal">
    <h2>Change Password</h2>
    <input type="password" id="currentPw" placeholder="Current password" autocomplete="current-password">
    <input type="password" id="newPw" placeholder="New password" autocomplete="new-password">
    <input type="password" id="confirmPw" placeholder="Confirm new password" autocomplete="new-password">
    <div class="modal-msg" id="pwMsg"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeChangePassword()">Cancel</button>
      <button class="btn-save" id="pwSaveBtn" onclick="submitChangePassword()">Save</button>
    </div>
  </div>
</div>

<script>

if (localStorage.getItem("adminLoggedIn") !== "true") {
  window.location.href = "admin-login.html";
}

window.onload = () => {
  document.body.classList.add("loaded");
};

function openPage(page) {
  window.location.href = page;
}

function logout() {
  localStorage.removeItem("adminLoggedIn");
  localStorage.removeItem("adminToken");
  window.location.href = "admin-login.html";
}

function openChangePassword() {
  document.getElementById("currentPw").value = "";
  document.getElementById("newPw").value = "";
  document.getElementById("confirmPw").value = "";
  document.getElementById("pwMsg").textContent = "";
  document.getElementById("pwMsg").className = "modal-msg";
  document.getElementById("pwSaveBtn").disabled = false;
  document.getElementById("pwModal").classList.add("open");
}

function closeChangePassword() {
  document.getElementById("pwModal").classList.remove("open");
}

async function submitChangePassword() {
  const currentPassword = document.getElementById("currentPw").value.trim();
  const newPassword     = document.getElementById("newPw").value.trim();
  const confirmPassword = document.getElementById("confirmPw").value.trim();
  const msg = document.getElementById("pwMsg");
  const btn = document.getElementById("pwSaveBtn");

  msg.className = "modal-msg";
  msg.textContent = "";

  if (!currentPassword || !newPassword || !confirmPassword) {
    msg.className = "modal-msg error";
    msg.textContent = "Please fill in all fields.";
    return;
  }

  if (newPassword !== confirmPassword) {
    msg.className = "modal-msg error";
    msg.textContent = "New passwords do not match.";
    return;
  }

  if (newPassword.length < 6) {
    msg.className = "modal-msg error";
    msg.textContent = "New password must be at least 6 characters.";
    return;
  }

  const token = localStorage.getItem("adminToken");
  if (!token) {
    msg.className = "modal-msg error";
    msg.textContent = "Session expired. Please log in again.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Saving…";

  try {
    const res = await fetch("/change-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();
    if (res.ok) {
      msg.className = "modal-msg success";
      msg.textContent = "Password updated successfully!";
      setTimeout(closeChangePassword, 1500);
    } else {
      msg.className = "modal-msg error";
      msg.textContent = data.message || "Something went wrong.";
    }
  } catch(e) {
    msg.className = "modal-msg error";
    msg.textContent = "Network error. Please try again.";
  }

  btn.disabled = false;
  btn.textContent = "Save";
}

// Close modal if clicking outside
document.getElementById("pwModal").addEventListener("click", function(e) {
  if (e.target === this) closeChangePassword();
});

function openCreateAdmin() {
  document.getElementById("newAdminUsername").value = "";
  document.getElementById("newAdminPassword").value = "";
  document.getElementById("newAdminConfirm").value = "";
  document.getElementById("createAdminMsg").textContent = "";
  document.getElementById("createAdminMsg").className = "modal-msg";
  document.getElementById("createAdminBtn").disabled = false;
  document.getElementById("createAdminBtn").textContent = "Create";
  document.getElementById("createAdminModal").classList.add("open");
}

function closeCreateAdmin() {
  document.getElementById("createAdminModal").classList.remove("open");
}

async function submitCreateAdmin() {
  const username = document.getElementById("newAdminUsername").value.trim();
  const password = document.getElementById("newAdminPassword").value.trim();
  const confirm  = document.getElementById("newAdminConfirm").value.trim();
  const msg = document.getElementById("createAdminMsg");
  const btn = document.getElementById("createAdminBtn");

  msg.className = "modal-msg";
  msg.textContent = "";

  if (!username || !password || !confirm) {
    msg.className = "modal-msg error";
    msg.textContent = "Please fill in all fields.";
    return;
  }

  if (password !== confirm) {
    msg.className = "modal-msg error";
    msg.textContent = "Passwords do not match.";
    return;
  }

  if (password.length < 6) {
    msg.className = "modal-msg error";
    msg.textContent = "Password must be at least 6 characters.";
    return;
  }

  const token = localStorage.getItem("adminToken");
  if (!token) {
    msg.className = "modal-msg error";
    msg.textContent = "Session expired. Please log in again.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Creating…";

  try {
    const res = await fetch("/create-admin", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      msg.className = "modal-msg success";
      msg.textContent = "Admin \"" + username + "\" created successfully!";
      setTimeout(closeCreateAdmin, 1800);
    } else {
      msg.className = "modal-msg error";
      msg.textContent = data.message || "Something went wrong.";
    }
  } catch(e) {
    msg.className = "modal-msg error";
    msg.textContent = "Network error. Please try again.";
  }

  btn.disabled = false;
  btn.textContent = "Create";
}

document.getElementById("createAdminModal").addEventListener("click", function(e) {
  if (e.target === this) closeCreateAdmin();
});

async function openDeleteAdmin() {
  document.getElementById("deleteAdminMsg").textContent = "";
  document.getElementById("deleteAdminMsg").className = "modal-msg";
  document.getElementById("adminListWrap").innerHTML = "<div style='color:#888;font-size:13px;'>Loading…</div>";
  document.getElementById("deleteAdminModal").classList.add("open");

  const token = localStorage.getItem("adminToken");
  try {
    const res = await fetch("/admins", { headers: { "Authorization": "Bearer " + token } });
    const admins = await res.json();
    renderAdminList(admins);
  } catch(e) {
    document.getElementById("adminListWrap").innerHTML = "<div style='color:#c0392b;font-size:13px;'>Failed to load admins.</div>";
  }
}

function renderAdminList(admins) {
  const wrap = document.getElementById("adminListWrap");
  if (!admins.length) {
    wrap.innerHTML = "<div style='color:#888;font-size:13px;text-align:center;padding:10px 0;'>No other admins to show.</div>";
    return;
  }
  wrap.innerHTML = admins.map(a =>
    `<div class="admin-row" id="admin-row-${a.id}">
      <span class="admin-row-name">${a.username}</span>
      <button class="btn-delete-row" onclick="confirmDeleteAdmin(${a.id},'${a.username}')">Delete</button>
    </div>`
  ).join("");
}

function confirmDeleteAdmin(id, username) {
  const msg = document.getElementById("deleteAdminMsg");
  msg.className = "modal-msg";
  msg.innerHTML = `Are you sure you want to delete <strong>${username}</strong>?
    <br><br>
    <button class="btn-delete-row" onclick="doDeleteAdmin(${id},'${username}')">Yes, delete</button>
    &nbsp;
    <button class="btn-cancel" style="padding:6px 14px;font-size:12px;" onclick="clearDeleteMsg()">Cancel</button>`;
}

function clearDeleteMsg() {
  const msg = document.getElementById("deleteAdminMsg");
  msg.textContent = "";
  msg.className = "modal-msg";
}

async function doDeleteAdmin(id, username) {
  const msg = document.getElementById("deleteAdminMsg");
  const token = localStorage.getItem("adminToken");
  const btn = document.querySelector(`#admin-row-${id} .btn-delete-row`);
  if (btn) btn.disabled = true;
  clearDeleteMsg();

  try {
    const res = await fetch("/admins/" + id, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    if (res.ok) {
      const row = document.getElementById("admin-row-" + id);
      if (row) row.remove();
      msg.className = "modal-msg success";
      msg.textContent = "\"" + username + "\" has been deleted.";
      setTimeout(clearDeleteMsg, 2000);
    } else {
      msg.className = "modal-msg error";
      msg.textContent = data.message || "Failed to delete admin.";
      if (btn) btn.disabled = false;
    }
  } catch(e) {
    msg.className = "modal-msg error";
    msg.textContent = "Network error. Please try again.";
    if (btn) btn.disabled = false;
  }
}

function closeDeleteAdmin() {
  document.getElementById("deleteAdminModal").classList.remove("open");
}

document.getElementById("deleteAdminModal").addEventListener("click", function(e) {
  if (e.target === this) closeDeleteAdmin();
});

</script>

</body>
</html>
