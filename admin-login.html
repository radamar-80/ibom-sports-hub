<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="box">
  <h3>Admin Login</h3>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">LOGIN</button>
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // 🔐 CHANGE THESE
  if (user === "admin" && pass === "1234") {
    localStorage.setItem("adminLoggedIn", "true");
    window.location.href = "admin-dashboard.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
