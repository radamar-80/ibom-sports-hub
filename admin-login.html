<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 30px 20px;
}

.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 24px;
}

.brand img {
  width: 72px;
  height: 72px;
  object-fit: contain;
  border-radius: 50%;
  margin-bottom: 10px;
}

.brand-name {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: #111;
  text-align: center;
}

.box {
  background: white;
  padding: 36px 32px;
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.box h3 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 22px;
  color: #111;
}

input {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1.5px solid #ddd;
  font-size: 15px;
  font-family: Arial, sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

input:focus {
  border-color: green;
}

.error-msg {
  margin-top: 14px;
  padding: 11px 14px;
  background: #fdecea;
  color: #c0392b;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  display: none;
}

.error-msg.show { display: block; }

button {
  display: block;
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  background: green;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  transition: opacity 0.2s;
}

button:hover  { opacity: 0.88; }
button:active { opacity: 0.75; }
button:disabled { opacity: 0.55; cursor: not-allowed; }
</style>

</head>

<body>

<div class="brand">
  <img src="logo.png" alt="Ibom Sports Hub Logo">
  <span class="brand-name">IBOM SPORTS HUB</span>
</div>

<div class="box">
  <h3>Admin Login</h3>

  <input id="username" type="text" placeholder="Username" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false">
  <input id="password" type="password" placeholder="Password" autocomplete="current-password">

  <div class="error-msg" id="errorMsg"></div>

  <button id="loginBtn" onclick="login()">LOGIN</button>
</div>

<script>
function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.classList.add("show");
}

function clearError() {
  document.getElementById("errorMsg").classList.remove("show");
}

// Allow pressing Enter to submit
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") login();
});

async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");

  clearError();

  if (!username || !password) {
    showError("Please enter your username and password.");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Logging in…";

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("adminToken", data.token);
      localStorage.setItem("adminLoggedIn", "true");
      window.location.href = "admin-dashboard.html";
    } else {
      showError(data.message || "Login failed. Please try again.");
      btn.disabled = false;
      btn.textContent = "LOGIN";
    }
  } catch(e) {
    showError("Network error. Please check your connection and try again.");
    btn.disabled = false;
    btn.textContent = "LOGIN";
  }
}
</script>

</body>
</html>
